<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>服務管理系統 · 3D 架構圖</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0b10;overflow:hidden;height:100vh;
     font-family:'Noto Sans TC',system-ui,sans-serif;color:#fff}

/* ── Path bar ── */
#pathbar{position:fixed;bottom:0;left:0;right:0;height:46px;z-index:100;
         background:rgba(10,11,16,.88);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
         border-top:1px solid rgba(255,255,255,.06);
         display:flex;align-items:center;gap:8px;padding:0 18px;overflow-x:auto}
#pbar-label{font-size:10px;color:rgba(255,255,255,.22);white-space:nowrap;margin-right:2px}
.pchip{padding:3px 12px;border-radius:20px;font-size:11px;font-weight:700;
       border:1px solid transparent;cursor:pointer;background:transparent;
       transition:all .18s;white-space:nowrap;opacity:.5}
.pchip:hover{opacity:.85}
.pchip.on{opacity:1;filter:brightness(1.2)}
[data-p="cost"]    {color:#fbbf24;border-color:#fbbf2455}
[data-p="sync"]    {color:#22d3ee;border-color:#22d3ee55}
[data-p="guard"]   {color:#f87171;border-color:#f8717155}
[data-p="secret"]  {color:#34d399;border-color:#34d39955}
[data-p="design"]  {color:#f472b6;border-color:#f472b655}
[data-p="databind"]{color:#60a5fa;border-color:#60a5fa55}
[data-p="arch"]    {color:#fb923c;border-color:#fb923c55}

#hdr{position:fixed;top:0;left:0;right:0;height:44px;z-index:100;
     background:rgba(10,11,16,.85);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
     border-bottom:1px solid rgba(255,255,255,.06);
     display:flex;align-items:center;gap:12px;padding:0 18px}
.badge{background:#7c3aed;color:#fff;font-size:10px;font-weight:800;
       padding:2px 8px;border-radius:4px;letter-spacing:.04em}
#hdr h1{font-size:14px;font-weight:800}
#hint{font-size:10px;color:rgba(255,255,255,.28);white-space:nowrap;margin-left:auto}
#lang-btn{margin-left:10px;padding:3px 10px;border-radius:4px;font-size:10px;font-weight:700;
          border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.55);
          cursor:pointer;white-space:nowrap;transition:all .18s}
#lang-btn:hover{background:rgba(255,255,255,.08);color:#fff}
#brand-strip{position:fixed;top:44px;right:0;z-index:101;
             padding:5px 18px 6px;
             display:flex;flex-direction:column;align-items:flex-end;gap:5px}
#credit{font-size:11px;color:rgba(255,255,255,.32);white-space:nowrap;
        cursor:default;letter-spacing:.03em;line-height:1;position:relative;font-weight:500}
#credit:hover{color:rgba(255,255,255,.6)}
#credit::after{content:attr(data-tip);position:absolute;right:0;top:calc(100% + 5px);
               font-size:9px;white-space:nowrap;pointer-events:none;z-index:300;
               background:rgba(10,11,16,.88);border:1px solid rgba(255,255,255,.12);
               color:rgba(255,255,255,.55);padding:3px 8px;border-radius:3px;
               opacity:0;transition:opacity .15s}
#credit:hover::after{opacity:1}
#nav-btns{display:flex;gap:4px}
.nav-btn{padding:2px 9px;border-radius:4px;font-size:12px;line-height:1.4;
         border:1px solid rgba(255,255,255,.14);background:transparent;
         color:rgba(255,255,255,.4);cursor:pointer;transition:all .15s}
.nav-btn:hover{color:#fff;border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.06)}

#panel{position:fixed;right:0;top:44px;bottom:0;width:280px;z-index:100;
       background:rgba(10,11,16,.93);-webkit-backdrop-filter:blur(18px);backdrop-filter:blur(18px);
       border-left:1px solid rgba(255,255,255,.06);
       overflow-y:auto;padding:16px;
       transform:translateX(100%);transition:transform .26s ease}
#panel.open{transform:none}
.pt{font-size:14px;font-weight:800;margin-bottom:4px}
.pd{font-size:11px;color:rgba(255,255,255,.48);line-height:1.65;margin-bottom:10px}
.ph4{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
     color:rgba(255,255,255,.25);margin:10px 0 4px}
.pi{font-size:11px;color:rgba(255,255,255,.6);padding:3px 0;
    border-bottom:1px solid rgba(255,255,255,.04);line-height:1.5}
.pf{font-size:10px;font-family:monospace;color:#60a5fa;margin-top:10px;
    background:rgba(37,99,235,.1);padding:5px 8px;border-radius:4px;word-break:break-all}
.pc{font-size:10px;color:rgba(255,255,255,.3);margin-top:6px}
.pc-meta{margin-top:8px}
.pc span{color:rgba(255,255,255,.55)}
#p-empty{color:rgba(255,255,255,.2);font-size:12px;text-align:center;
         padding:40px 0;line-height:2.2}

#node-tip{position:fixed;pointer-events:none;z-index:200;
          font-size:9px;font-weight:800;letter-spacing:.06em;
          padding:2px 6px;border-radius:3px;
          background:rgba(10,11,16,.82);border:1px solid rgba(255,255,255,.15);
          color:rgba(255,255,255,.65);display:none;white-space:nowrap}

#leg{position:fixed;bottom:60px;left:14px;z-index:100;
     background:rgba(10,11,16,.8);border:1px solid rgba(255,255,255,.07);
     border-radius:7px;padding:9px 13px;
     display:flex;flex-direction:column;gap:5px}
.lg{display:flex;align-items:center;gap:7px;font-size:10px;color:rgba(255,255,255,.45)}
.ld{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ld-python  {background:#22d3ee;box-shadow:0 0 5px #22d3ee66}
.ld-ps1     {background:#38bdf8;box-shadow:0 0 5px #38bdf866}
.ld-data    {background:#4ade80;box-shadow:0 0 5px #4ade8066}
.ld-js      {background:#fbbf24;box-shadow:0 0 5px #fbbf2466}
.ld-insight {background:#a78bfa;box-shadow:0 0 5px #a78bfa66}
.ld-md      {background:#94a3b8;box-shadow:0 0 5px #94a3b866}
.ld-design  {background:#f472b6;box-shadow:0 0 5px #f472b666}
.ld-arch    {background:#fb923c;box-shadow:0 0 5px #fb923c66}
.ld-guard   {background:#f87171;box-shadow:0 0 5px #f8717166}
.ld-secret  {background:#34d399;box-shadow:0 0 5px #34d39966}
.ld-databind{background:#60a5fa;box-shadow:0 0 5px #60a5fa66}

.node-label{font-family:system-ui,sans-serif;font-size:10px;
            color:rgba(255,255,255,.7);background:rgba(10,11,16,.55);
            padding:1px 5px;border-radius:3px;pointer-events:none;white-space:nowrap}

/* ── Palette bar ── */
#palette-bar{position:fixed;right:14px;bottom:60px;z-index:100;
             background:rgba(10,11,16,.82);border:1px solid rgba(255,255,255,.07);
             border-radius:7px;padding:7px 10px;
             display:flex;flex-direction:column;gap:5px;align-items:flex-end}
#palette-bar .pal-label{font-size:9px;color:rgba(255,255,255,.22);letter-spacing:.06em;
                         text-transform:uppercase;margin-bottom:1px}
.pal-btn{display:flex;gap:3px;align-items:center;padding:3px 7px 3px 5px;
         border-radius:4px;border:1px solid rgba(255,255,255,.1);background:transparent;
         cursor:pointer;transition:all .15s;white-space:nowrap}
.pal-btn:hover{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.05)}
.pal-btn.active{border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.08)}
.pal-btn .ps{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.pal-btn .pn{font-size:9px;color:rgba(255,255,255,.45);margin-left:3px}

/* ── Home button ── */
#home-btn{
  background:none;border:1px solid rgba(255,255,255,.18);
  color:rgba(255,255,255,.4);border-radius:5px;
  padding:4px 10px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;line-height:1;
  transition:all .15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
#home-btn:hover,#home-btn:active{color:#fff;border-color:rgba(255,255,255,.5)}

/* ── Responsive / Touch ── */
button{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
@media(max-width:768px){
  #hint{display:none}
  #panel{width:min(280px,90vw)}
  #palette-bar{display:none}
  .nav-btn{padding:6px 16px;font-size:14px}
}
@media(max-width:480px){
  #hdr h1{font-size:12px}
  #credit{display:none}
  #panel{width:100vw}
}
</style>
</head>
<body>

<div id="hdr">
  <span class="badge">系統展示</span>
  <h1>服務管理系統 · 3D 架構視圖</h1>
  <span id="hint">Drag 旋轉 · Scroll 縮放 · Click 節點查看詳情</span>
  <button type="button" id="lang-btn">中文</button>
</div>
<div id="brand-strip">
  <span id="credit" data-tip="版權所有 Copyright All Reserved">張立群建築師事務所｜CLUSTER&amp;Associates</span>
  <div id="nav-btns">
    <button type="button" class="nav-btn" id="btn-prev">&#8249;</button>
    <button type="button" class="nav-btn" id="btn-reset">⊙</button>
    <button type="button" class="nav-btn" id="btn-next">&#8250;</button>
  </div>
</div>

<div id="node-tip"></div>
<div id="panel"><div id="p-empty">← 點擊節點<br>查看詳細說明</div></div>

<div id="pathbar">
  <button type="button" id="home-btn" title="Home">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
  </button>
  <span id="pbar-label">決策路徑</span>
  <button type="button" class="pchip" data-p="cost">💰 Cost 預算鏈</button>
  <button type="button" class="pchip" data-p="sync">🔄 Sync 主流程</button>
  <button type="button" class="pchip" data-p="guard">🛡 Guard 審計</button>
  <button type="button" class="pchip" data-p="secret">🔐 Secret 掃描</button>
  <button type="button" class="pchip" data-p="design">🎨 Design 合規</button>
  <button type="button" class="pchip" data-p="databind">📡 Data-Bind</button>
  <button type="button" class="pchip" data-p="arch">📐 Arch 維護</button>
</div>

<div id="leg">
  <div class="lg"><div class="ld ld-python"></div><span data-leg="python">擷取腳本</span></div>
  <div class="lg"><div class="ld ld-ps1"></div><span data-leg="ps1">排程腳本</span></div>
  <div class="lg"><div class="ld ld-data"></div><span data-leg="data">資料檔案</span></div>
  <div class="lg"><div class="ld ld-js"></div><span data-leg="js">JS 模組</span></div>
  <div class="lg"><div class="ld ld-insight"></div><span data-leg="insight">智能代理</span></div>
  <div class="lg"><div class="ld ld-md"></div><span data-leg="md">文件</span></div>
  <div class="lg"><div class="ld ld-design"></div><span data-leg="design">設計</span></div>
  <div class="lg"><div class="ld ld-arch"></div><span data-leg="arch">架構</span></div>
  <div class="lg"><div class="ld ld-guard"></div><span data-leg="guard">防護</span></div>
  <div class="lg"><div class="ld ld-secret"></div><span data-leg="secret">安全掃描</span></div>
  <div class="lg"><div class="ld ld-databind"></div><span data-leg="databind">資料綁定</span></div>
</div>

<div id="palette-bar">
  <span class="pal-label">配色</span>
</div>
