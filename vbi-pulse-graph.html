<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>服務管理系統 · Graph View</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0b10;overflow:hidden;height:100vh;
     font-family:'Noto Sans TC',system-ui,sans-serif;color:#fff}
canvas{display:block;position:fixed;inset:0}

/* ── Header ── */
#hdr{position:fixed;top:0;left:0;right:0;height:44px;z-index:100;
     background:rgba(10,11,16,.85);backdrop-filter:blur(14px);
     border-bottom:1px solid rgba(255,255,255,.06);
     display:flex;align-items:center;gap:12px;padding:0 18px}
.badge{background:#7c3aed;color:#fff;font-size:10px;font-weight:800;
       padding:2px 8px;border-radius:4px;letter-spacing:.04em}
#hdr h1{font-size:14px;font-weight:800}
.flt{padding:3px 12px;border-radius:4px;font-size:11px;font-weight:700;
     border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.5);
     cursor:pointer;background:transparent;transition:all .15s}
.flt:hover{color:#fff;border-color:rgba(255,255,255,.3)}
.flt.on{background:#2563eb22;border-color:#2563eb;color:#93c5fd}
#hdr .sep{width:1px;height:18px;background:rgba(255,255,255,.1);margin:0 2px}
#searchbox{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
           border-radius:5px;padding:4px 10px;font-size:11px;color:#fff;
           outline:none;width:160px;margin-left:auto}
#searchbox::placeholder{color:rgba(255,255,255,.3)}
#searchbox:focus{border-color:#4f83cc;background:rgba(255,255,255,.09)}
#hint{font-size:10px;color:rgba(255,255,255,.28);white-space:nowrap}
#brand-strip{position:fixed;top:84px;right:0;z-index:101;
             padding:5px 18px 6px;
             display:flex;flex-direction:column;align-items:flex-end;gap:5px}
#nav-btns{display:flex;gap:4px}
.nav-btn{padding:1px 7px;border-radius:3px;font-size:11px;line-height:1.5;
         border:1px solid rgba(255,255,255,.14);background:transparent;
         color:rgba(255,255,255,.38);cursor:pointer;transition:all .15s}
.nav-btn:hover{color:#fff;border-color:rgba(255,255,255,.38);background:rgba(255,255,255,.06)}
#lang-btn{margin-left:6px;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:700;
          border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.6);
          cursor:pointer;background:transparent;transition:all .15s}
#lang-btn:hover{color:#fff;border-color:rgba(255,255,255,.5)}
#credit{font-size:11px;color:rgba(255,255,255,.18);white-space:nowrap;
        cursor:default;letter-spacing:.02em;line-height:1;position:relative}
#credit:hover{color:rgba(255,255,255,.38)}
#credit::after{content:attr(data-tip);position:absolute;right:0;top:calc(100% + 5px);
               font-size:9px;white-space:nowrap;pointer-events:none;z-index:300;
               background:rgba(10,11,16,.88);border:1px solid rgba(255,255,255,.12);
               color:rgba(255,255,255,.55);padding:3px 8px;border-radius:3px;
               opacity:0;transition:opacity .15s}
#credit:hover::after{opacity:1}

/* ── Side Panel ── */
#panel{position:fixed;right:0;top:84px;bottom:46px;width:268px;z-index:100;
       background:rgba(10,11,16,.93);-webkit-backdrop-filter:blur(18px);backdrop-filter:blur(18px);
       border-left:1px solid rgba(255,255,255,.06);
       overflow-y:auto;padding:15px;
       transform:translateX(100%);transition:transform .26s ease}
#panel.open{transform:none}
.pt{font-size:14px;font-weight:800;margin-bottom:3px}
.pd{font-size:11px;color:rgba(255,255,255,.48);line-height:1.65;margin-bottom:10px}
.ph4{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
     color:rgba(255,255,255,.25);margin:10px 0 4px}
.pi{font-size:11px;color:rgba(255,255,255,.6);padding:3px 0;
    border-bottom:1px solid rgba(255,255,255,.04);line-height:1.5}
.pf{font-size:10px;font-family:monospace;color:#60a5fa;margin-top:10px;
    background:rgba(37,99,235,.1);padding:5px 8px;border-radius:4px;
    word-break:break-all}
.pc{font-size:10px;color:rgba(255,255,255,.3);margin-top:6px}
.pc span{color:rgba(255,255,255,.55)}
#p-empty{color:rgba(255,255,255,.2);font-size:12px;text-align:center;
         padding:40px 0;line-height:2.2}

/* ── Legend ── */
#leg{position:fixed;bottom:60px;left:14px;z-index:100;
     background:rgba(10,11,16,.8);border:1px solid rgba(255,255,255,.07);
     border-radius:7px;padding:9px 13px;
     display:flex;flex-direction:column;gap:5px}
.lg{display:flex;align-items:center;gap:7px;font-size:10px;color:rgba(255,255,255,.45)}
.ld{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── Palette bar ── */
#palette-bar{position:fixed;right:14px;bottom:60px;z-index:100;
             background:rgba(10,11,16,.82);border:1px solid rgba(255,255,255,.07);
             border-radius:7px;padding:7px 10px;
             display:flex;flex-direction:column;gap:5px;align-items:flex-end}
#palette-bar .pal-label{font-size:9px;color:rgba(255,255,255,.22);letter-spacing:.06em;
                         text-transform:uppercase;margin-bottom:1px}
.pal-btn{display:flex;gap:3px;align-items:center;padding:3px 7px 3px 5px;
         border-radius:4px;border:1px solid rgba(255,255,255,.1);background:transparent;
         cursor:pointer;transition:all .15s;white-space:nowrap}
.pal-btn:hover{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.05)}
.pal-btn.active{border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.08)}
.pal-btn .ps{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.pal-btn .pn{font-size:9px;color:rgba(255,255,255,.45);margin-left:3px}

/* ── Node count ── */
#nodecount{position:fixed;bottom:60px;right:280px;z-index:100;
           font-size:10px;color:rgba(255,255,255,.22);transition:right .28s ease}
#nodecount.panelopen{right:283px}

/* ── Layout row ── */
#hdr2{position:fixed;top:44px;left:0;right:0;height:40px;z-index:100;
      background:rgba(10,11,16,.80);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
      border-bottom:1px solid rgba(255,255,255,.05);
      display:flex;align-items:center;gap:8px;padding:0 18px}
#lyt-label{font-size:10px;color:rgba(255,255,255,.22);margin-right:2px;white-space:nowrap}
#lyt-hint{font-size:10px;color:rgba(255,255,255,.22)}
.lyt{padding:3px 11px;border-radius:4px;font-size:11px;font-weight:700;
     border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.42);
     cursor:pointer;background:transparent;transition:all .15s}
.lyt:hover{color:#fff;border-color:rgba(255,255,255,.28)}
.lyt.on{background:#7c3aed22;border-color:#7c3aed;color:#c4b5fd}
.lyt-sep{width:1px;height:16px;background:rgba(255,255,255,.08);margin:0 2px}

/* ── Path bar ── */
#pathbar{position:fixed;bottom:0;left:0;right:0;height:46px;z-index:100;
         background:rgba(10,11,16,.88);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
         border-top:1px solid rgba(255,255,255,.06);
         display:flex;align-items:center;gap:8px;padding:0 18px;overflow-x:auto}
#pbar-label{font-size:10px;color:rgba(255,255,255,.22);white-space:nowrap;margin-right:2px}
.pchip{padding:3px 12px;border-radius:20px;font-size:11px;font-weight:700;
       border:1px solid transparent;cursor:pointer;background:transparent;transition:all .18s;
       white-space:nowrap;opacity:.55}
.pchip:hover{opacity:.85;filter:brightness(1.15)}
.pchip.on{opacity:1;filter:brightness(1.15)}
[data-p="cost"]    {color:#fbbf24;border-color:#fbbf2466}
[data-p="sync"]    {color:#22d3ee;border-color:#22d3ee66}
[data-p="guard"]   {color:#f87171;border-color:#f8717166}
[data-p="secret"]  {color:#34d399;border-color:#34d39966}
[data-p="design"]  {color:#f472b6;border-color:#f472b666}
[data-p="databind"]{color:#60a5fa;border-color:#60a5fa66}
[data-p="arch"]    {color:#fb923c;border-color:#fb923c66}

/* ── Responsive / Touch ── */
button{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
@media(max-width:768px){
  #hint{display:none}
  #panel{width:min(268px,90vw)}
  #palette-bar{display:none}
  #nodecount{display:none}
  .nav-btn{padding:6px 16px;font-size:14px}
  #hdr input{display:none}
}
@media(max-width:480px){
  #hdr h1{font-size:12px}
  #credit{display:none}
  #panel{width:100vw}
  #hdr2{overflow-x:auto}
  .lyt,.flt{font-size:10px;padding:2px 8px}
}
</style>
</head>
<body>
<canvas id="cv"></canvas>

<div id="hdr">
  <span class="badge">系統展示</span>
  <h1 id="hdr-h1">服務管理系統 · Graph View</h1>
  <div class="sep"></div>
  <button type="button" class="flt on"  data-g="all">全部</button>
  <button type="button" class="flt"     data-g="pipeline">管線</button>
  <button type="button" class="flt"     data-g="agents">治理</button>
  <input id="searchbox" type="text" placeholder="搜尋節點…" autocomplete="off">
  <span id="hint">Drag 平移 · Scroll 縮放 · Drag 節點移動 · Click 鎖定</span>
</div>
<div id="brand-strip">
  <span id="credit" data-tip="版權所有 Copyright All Reserved">張立群建築師事務所｜CLUSTER&amp;Associates</span>
  <button type="button" id="lang-btn">中文</button>
  <div id="nav-btns">
    <button type="button" id="home-btn" class="nav-btn" title="Home">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </button>
    <button type="button" class="nav-btn" id="btn-prev">&#8249;</button>
    <button type="button" class="nav-btn" id="btn-reset">⊙</button>
    <button type="button" class="nav-btn" id="btn-next">&#8250;</button>
  </div>
</div>

<div id="hdr2">
  <span id="lyt-label">佈局</span>
  <button type="button" class="lyt on"  data-l="organic">🌐 有機</button>
  <button type="button" class="lyt"     data-l="flow">→ 流程</button>
  <button type="button" class="lyt"     data-l="supervision">👁 監督</button>
  <button type="button" class="lyt"     data-l="radial">⬤ 放射</button>
  <div class="lyt-sep"></div>
  <span id="lyt-hint">切換排列可呈現不同資料路徑視角</span>
</div>

<div id="panel"><div id="p-empty">← 點擊節點<br>查看詳細說明</div></div>
<div id="nodecount"></div>

<div id="leg">
  <div class="lg"><div class="ld" data-cat="python"  ></div><span data-leg="python">擷取腳本</span></div>
  <div class="lg"><div class="ld" data-cat="ps1"     ></div><span data-leg="ps1">排程腳本</span></div>
  <div class="lg"><div class="ld" data-cat="data"    ></div><span data-leg="data">資料檔案</span></div>
  <div class="lg"><div class="ld" data-cat="js"      ></div><span data-leg="js">介面模組</span></div>
  <div class="lg"><div class="ld" data-cat="insight" ></div><span data-leg="insight">分析模組</span></div>
  <div class="lg"><div class="ld" data-cat="md"      ></div><span data-leg="md">知識文件</span></div>
  <div class="lg"><div class="ld" data-cat="design"  ></div><span data-leg="design">合規模組</span></div>
  <div class="lg"><div class="ld" data-cat="arch"    ></div><span data-leg="arch">架構模組</span></div>
  <div class="lg"><div class="ld" data-cat="guard"   ></div><span data-leg="guard">防護模組</span></div>
  <div class="lg"><div class="ld" data-cat="secret"  ></div><span data-leg="secret">安全模組</span></div>
  <div class="lg"><div class="ld" data-cat="databind"></div><span data-leg="databind">資料綁定</span></div>
</div>

<div id="palette-bar">
  <span class="pal-label">配色</span>
</div>

<div id="pathbar">
  <span id="pbar-label">決策路徑</span>
  <button type="button" class="pchip" data-p="cost">💰 Cost 預算鏈</button>
  <button type="button" class="pchip" data-p="sync">🔄 Sync 主流程</button>
  <button type="button" class="pchip" data-p="guard">🛡 Guard 審計</button>
  <button type="button" class="pchip" data-p="secret">🔐 Secret 掃描</button>
  <button type="button" class="pchip" data-p="design">🎨 Design 合規</button>
  <button type="button" class="pchip" data-p="databind">📡 Data-Bind</button>
  <button type="button" class="pchip" data-p="arch">📐 Arch 維護</button>
</div>
